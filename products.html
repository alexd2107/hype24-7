<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPELIFE</title>
<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.3.8/lib/index.iife.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}

  /* ── HEADER ── */
  header{background:linear-gradient(135deg,#0f0f0f 0%,#1a1a1a 100%);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #ff6a00;position:sticky;top:0;z-index:100}
  .logo{font-size:2rem;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,#ff6a00,#ee0979,#ff6a00);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
  @keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
  .header-right{display:flex;align-items:center;gap:1rem}
  .cart-btn{background:#ff6a00;border:none;color:#fff;padding:.6rem 1.2rem;border-radius:25px;cursor:pointer;font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:.4rem;transition:background .2s}
  .cart-btn:hover{background:#ee0979}
  .wallet-btn{background:linear-gradient(135deg,#9945ff,#14f195);border:none;color:#fff;padding:.6rem 1.2rem;border-radius:25px;cursor:pointer;font-weight:700;font-size:.85rem;transition:opacity .2s}
  .wallet-btn:hover{opacity:.85}
  .wallet-connected{background:linear-gradient(135deg,#14f195,#0ea5e9);font-size:.8rem}

  /* ── CONTROLS ── */
  .controls{background:#1a1a1a;padding:1rem 2rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;border-bottom:1px solid #2a2a2a}
  .controls input{flex:1;min-width:200px;padding:.6rem 1rem;border-radius:20px;border:1px solid #333;background:#111;color:#fff;font-size:.9rem;outline:none}
  .controls input:focus{border-color:#ff6a00}
  .size-filter{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .size-filter label{color:#aaa;font-size:.85rem}
  #sizeSelect{padding:.5rem .8rem;border-radius:20px;border:1px solid #333;background:#111;color:#fff;font-size:.85rem;outline:none;cursor:pointer}
  #sizeSelect:focus{border-color:#ff6a00}

  /* ── TABS ── */
  .tabs{display:flex;gap:0;background:#111;border-bottom:2px solid #222;padding:0 2rem}
  .tab-btn{padding:.9rem 2rem;background:none;border:none;color:#888;font-size:1rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:1px}
  .tab-btn.active{color:#ff6a00;border-bottom-color:#ff6a00}
  .tab-btn:hover:not(.active){color:#fff}
  .tab-count{font-size:.7rem;background:#333;color:#aaa;padding:.1rem .4rem;border-radius:10px;margin-left:.4rem}
  .tab-btn.active .tab-count{background:#ff6a00;color:#fff}

  /* ── GRID ── */
  main{padding:2rem}
  .section{display:none}
  .section.active{display:block}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem;margin-top:1rem}

  /* ── CARD ── */
  .card{background:#1a1a1a;border-radius:16px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.4);transition:transform .2s,box-shadow .2s;position:relative}
  .card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(255,106,0,.2)}
  .card-img-wrap{background:#f5f5f5;height:220px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .card-img-wrap img{width:100%;height:100%;object-fit:contain;padding:8px}
  .ai-badge{position:absolute;top:6px;right:6px;font-size:.6rem;padding:.2rem .4rem;border-radius:8px;font-weight:700;letter-spacing:.5px}
  .ai-badge.shoes{background:#0ea5e9;color:#fff}
  .ai-badge.clothing{background:#8b5cf6;color:#fff}
  .ai-badge.collectables{background:#f59e0b;color:#fff}
  .ai-badge.loading{background:#555;color:#aaa}
  .card-body{padding:1rem}
  .card-name{font-weight:700;font-size:.95rem;margin-bottom:.4rem;line-height:1.3;color:#fff}
  .card-price{color:#ff6a00;font-weight:800;font-size:1.1rem;margin-bottom:.6rem}
  .card-sizes{font-size:.75rem;color:#888;margin-bottom:.8rem}
  .size-select-wrap{margin-bottom:.8rem}
  .size-select-wrap select{width:100%;padding:.4rem .6rem;border-radius:8px;border:1px solid #333;background:#111;color:#fff;font-size:.8rem;outline:none}
  .size-select-wrap select:focus{border-color:#ff6a00}
  .add-btn{width:100%;padding:.6rem;border-radius:10px;border:none;background:#ff6a00;color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .2s}
  .add-btn:hover{background:#ee0979}
  .add-btn.added{background:#22c55e}
  .loading-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;border-radius:16px}
  .spinner{width:28px;height:28px;border:3px solid #333;border-top-color:#ff6a00;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .no-results{grid-column:1/-1;text-align:center;padding:4rem;color:#555;font-size:1.1rem}

  /* ── CART DRAWER ── */
  .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none}
  .cart-overlay.open{display:block}
  .cart-drawer{position:fixed;right:0;top:0;bottom:0;width:400px;max-width:100vw;background:#1a1a1a;z-index:201;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.5);transform:translateX(100%);transition:transform .3s}
  .cart-drawer.open{transform:translateX(0)}
  .cart-header{padding:1.2rem 1.5rem;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}
  .cart-header h2{font-size:1.2rem;font-weight:700}
  .cart-close{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer}
  .cart-items{flex:1;overflow-y:auto;padding:1rem 1.5rem}
  .cart-item{display:flex;gap:1rem;align-items:flex-start;padding:.8rem 0;border-bottom:1px solid #222}
  .cart-item img{width:60px;height:60px;object-fit:contain;background:#f5f5f5;border-radius:8px;padding:4px}
  .cart-item-info{flex:1}
  .cart-item-name{font-size:.85rem;font-weight:600;margin-bottom:.2rem}
  .cart-item-size{font-size:.75rem;color:#888;margin-bottom:.3rem}
  .cart-item-price{font-size:.9rem;color:#ff6a00;font-weight:700}
  .cart-item-qty{display:flex;align-items:center;gap:.5rem;margin-top:.4rem}
  .qty-btn{background:#333;border:none;color:#fff;width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
  .qty-btn:hover{background:#ff6a00}
  .remove-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:1rem;padding:.2rem}
  .cart-footer{padding:1.2rem 1.5rem;border-top:1px solid #2a2a2a}
  .cart-total{display:flex;justify-content:space-between;font-size:1.1rem;font-weight:700;margin-bottom:1rem}
  .checkout-btn{width:100%;padding:.9rem;border-radius:12px;border:none;background:linear-gradient(135deg,#ff6a00,#ee0979);color:#fff;font-weight:800;font-size:1rem;cursor:pointer;transition:opacity .2s}
  .checkout-btn:hover{opacity:.9}
  .cart-empty{text-align:center;padding:3rem;color:#555}

  /* ── PAYMENT MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:none;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:#1a1a1a;border-radius:20px;padding:2rem;width:420px;max-width:95vw;border:1px solid #333}
  .modal h2{font-size:1.3rem;font-weight:800;margin-bottom:.5rem;text-align:center}
  .modal .total-display{text-align:center;font-size:2rem;font-weight:900;color:#ff6a00;margin:1rem 0}
  .modal .sol-equiv{text-align:center;font-size:.85rem;color:#888;margin-bottom:1.5rem}
  .wallet-status{text-align:center;padding:1rem;background:#111;border-radius:12px;margin-bottom:1rem;font-size:.85rem;color:#aaa}
  .wallet-status.connected{color:#14f195}
  .pay-options{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-bottom:1rem}
  .pay-btn{padding:1rem;border-radius:12px;border:none;color:#fff;font-weight:800;font-size:.9rem;cursor:pointer;transition:opacity .2s;display:flex;flex-direction:column;align-items:center;gap:.3rem}
  .pay-btn:hover{opacity:.85}
  .pay-btn:disabled{opacity:.4;cursor:not-allowed}
  .pay-btn.sol{background:linear-gradient(135deg,#9945ff,#14f195)}
  .pay-btn.usdc{background:linear-gradient(135deg,#2775ca,#0ea5e9)}
  .pay-btn .pay-amount{font-size:.75rem;font-weight:400;opacity:.85}
  .modal-close-btn{width:100%;padding:.7rem;border-radius:10px;border:1px solid #333;background:none;color:#888;cursor:pointer;font-size:.9rem}
  .modal-close-btn:hover{background:#222}

  /* ── SUCCESS MODAL ── */
  .success-modal{background:#1a1a1a;border-radius:20px;padding:2rem;width:420px;max-width:95vw;border:1px solid #22c55e;text-align:center}
  .success-modal .check{font-size:3rem;margin-bottom:1rem}
  .success-modal h2{color:#22c55e;margin-bottom:.5rem}
  .success-modal .tx-link{display:block;margin:1rem auto;padding:.6rem 1rem;background:#111;border-radius:10px;color:#0ea5e9;text-decoration:none;font-size:.8rem;word-break:break-all}
  .success-modal .tx-link:hover{background:#222}

  /* ── RESPONSIVE ── */
  @media(max-width:600px){
    .logo{font-size:1.4rem}
    main{padding:1rem}
    .cart-drawer{width:100vw}
    .pay-options{grid-template-columns:1fr}
    .tabs{padding:0 .5rem}
    .tab-btn{padding:.7rem 1rem;font-size:.85rem}
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">HYPELIFE</div>
  <div class="header-right">
    <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">🔗 Connect Wallet</button>
