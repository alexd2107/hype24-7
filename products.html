<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPELIFE</title>
<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@solana/spl-token@0.3.8/lib/index.iife.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f0f0f;color:#fff;min-height:100vh}
header{background:linear-gradient(135deg,#0f0f0f,#1a1a1a);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #ff6a00;position:sticky;top:0;z-index:100}
.logo{font-size:2rem;font-weight:900;letter-spacing:3px;background:linear-gradient(90deg,#ff6a00,#ee0979,#ff6a00);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
.header-right{display:flex;align-items:center;gap:.8rem}
.cart-btn{background:#ff6a00;border:none;color:#fff;padding:.6rem 1.2rem;border-radius:25px;cursor:pointer;font-weight:700;font-size:.9rem}
.cart-btn:hover{background:#ee0979}
.wallet-btn{background:linear-gradient(135deg,#9945ff,#14f195);border:none;color:#fff;padding:.6rem 1.2rem;border-radius:25px;cursor:pointer;font-weight:700;font-size:.85rem}
.controls{background:#1a1a1a;padding:1rem 2rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;border-bottom:1px solid #2a2a2a}
.controls input{flex:1;min-width:200px;padding:.6rem 1rem;border-radius:20px;border:1px solid #333;background:#111;color:#fff;font-size:.9rem;outline:none}
.controls input:focus{border-color:#ff6a00}
#sizeSelect{padding:.5rem .8rem;border-radius:20px;border:1px solid #333;background:#111;color:#fff;font-size:.85rem;outline:none;cursor:pointer}
.tabs{display:flex;background:#111;border-bottom:2px solid #222;padding:0 2rem;overflow-x:auto}
.tab-btn{padding:.9rem 1.5rem;background:none;border:none;color:#888;font-size:.95rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:#ff6a00;border-bottom-color:#ff6a00}
.tab-btn:hover:not(.active){color:#fff}
.tab-count{font-size:.7rem;background:#333;color:#aaa;padding:.1rem .4rem;border-radius:10px;margin-left:.4rem}
.tab-btn.active .tab-count{background:#ff6a00;color:#fff}
main{padding:2rem}
.section{display:none}
.section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.5rem;margin-top:1rem}
.card{background:#1a1a1a;border-radius:16px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,.4);transition:transform .2s,box-shadow .2s;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(255,106,0,.2)}
.card-img-wrap{background:#f5f5f5;height:220px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-img-wrap img{width:100%;height:100%;object-fit:contain;padding:8px}
.card-body{padding:1rem}
.card-name{font-weight:700;font-size:.9rem;margin-bottom:.4rem;line-height:1.3;color:#fff}
.card-price{color:#ff6a00;font-weight:800;font-size:1.05rem;margin-bottom:.5rem}
.card-sizes{font-size:.72rem;color:#888;margin-bottom:.7rem}
.size-pick{width:100%;padding:.4rem .6rem;border-radius:8px;border:1px solid #333;background:#111;color:#fff;font-size:.8rem;outline:none;margin-bottom:.7rem}
.add-btn{width:100%;padding:.6rem;border-radius:10px;border:none;background:#ff6a00;color:#fff;font-weight:700;font-size:.85rem;cursor:pointer}
.add-btn:hover{background:#ee0979}
.add-btn.added{background:#22c55e}
.no-results{text-align:center;padding:4rem;color:#555;grid-column:1/-1}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none}
.cart-overlay.open{display:block}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:400px;max-width:100vw;background:#1a1a1a;z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s}
.cart-drawer.open{transform:translateX(0)}
.cart-header{padding:1.2rem 1.5rem;border-bottom:1px solid #2a2a2a;display:flex;justify-content:space-between;align-items:center}
.cart-close{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer}
.cart-items{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.cart-item{display:flex;gap:1rem;align-items:flex-start;padding:.8rem 0;border-bottom:1px solid #222}
.cart-item img{width:60px;height:60px;object-fit:contain;background:#f5f5f5;border-radius:8px;padding:4px}
.cart-item-info{flex:1}
.cart-item-name{font-size:.82rem;font-weight:600}
.cart-item-size{font-size:.72rem;color:#888}
.cart-item-price{font-size:.9rem;color:#ff6a00;font-weight:700}
.cart-item-qty{display:flex;gap:.4rem;margin-top:.4rem}
.qty-btn{background:#333;border:none;color:#fff;width:22px;height:22px;border-radius:5px;cursor:pointer}
.qty-btn:hover{background:#ff6a00}
.remove-btn{background:none;border:none;color:#ef4444;cursor:pointer}
.cart-footer{padding:1.2rem 1.5rem;border-top:1px solid #2a2a2a}
.cart-total{display:flex;justify-content:space-between;font-size:1.1rem;font-weight:700;margin-bottom:1rem}
.checkout-btn{width:100%;padding:.9rem;border-radius:12px;border:none;background:linear-gradient(135deg,#ff6a00,#ee0979);color:#fff;font-weight:800;font-size:1rem;cursor:pointer}
.cart-empty{text-align:center;padding:3rem;color:#555}
@media(max-width:600px){.logo{font-size:1.3rem}main{padding:1rem}.cart-drawer{width:100vw}}
</style>
</head>
<body>
<header>
<div class="logo">HYPELIFE</div>
<div class="header-right">
<button class="wallet-btn" id="walletBtn" onclick="connectWallet()">🔗 Connect</button>
<button class="cart-btn" onclick="openCart()">🛒 <span id="cartCount">0</span></button>
</div>
</header>
<div class="controls">
<input type="text" id="searchInput" placeholder="Search..." oninput="applyFilters()">
<select id="sizeSelect" onchange="applyFilters()"><option value="">All Sizes</option></select>
</div>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('shoes',this)">👟 Shoes <span class="tab-count" id="cnt-shoes">0</span></button>
<button class="tab-btn" onclick="switchTab('clothing',this)">👕 Clothing <span class="tab-count" id="cnt-clothing">0</span></button>
<button class="tab-btn" onclick="switchTab('collectables',this)">🏆 Collectables <span class="tab-count" id="cnt-collectables">0</span></button>
</div>
<main>
<div class="section active" id="sec-shoes"><div class="grid" id="grid-shoes"></div></div>
<div class="section" id="sec-clothing"><div class="grid" id="grid-clothing"></div></div>
<div class="section" id="sec-collectables"><div class="grid" id="grid-collectables"></div></div>
</main>
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
<div class="cart-header"><h2>Cart</h2><button class="cart-close" onclick="closeCart()">×</button></div>
<div class="cart-items" id="cartItems"><div class="cart-empty">Your cart is empty</div></div>
<div class="cart-footer" id="cartFooter" style="display:none">
<div class="cart-total">Total: <span id="cartTotal">$0</span></div>
<button class="checkout-btn" onclick="openCheckout()">Checkout →</button>
</div>
</div>
<script>
const SHEET_ID='1Aus_5DALz7kUzWgJHctivOjm2CC0IZYVWmD5ZUzRBW0';
const VISION_KEY='AIzaSyBiq4GEakMEM0i5Jqsf5zcN1vS6fwAsxpw';
const MERCHANT='3NwyvRqqJw8Zyf2cNpJ6aUkpwpY4ZPkf3VZEqoEDmM3x';
const USDC_MINT='EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v';
let allProducts=[],cart=[],wallet=null,solPrice=0;
fetchSolPrice();
setInterval(fetchSolPrice,60000);
loadProducts();
async function fetchSolPrice(){try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');const d=await r.json();solPrice=d.solana?.usd||0}catch(e){}}
async function loadProducts(){const tabs=[{gid:'10727842',name:'jordan 1 and other items'},{gid:'2080136486',name:'jordan 4'},{gid:'184084881',name:'kobe'},{gid:'1280515311',name:'sbs'},{gid:'1929692327',name:'dunks'},{gid:'1941135183',name:'collabs'},{gid:'234881949',name:'asics and yeezy'},{gid:'0',name:'mschf'},{gid:'834494988',name:'crocs'}];for(const tab of tabs){try{const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${tab.gid}`;const res=await fetch(url);const txt=await res.text();const rows=txt.split('\n').slice(1).filter(r=>r.trim());for(const row of rows){const cols=row.split(',').map(c=>c.replace(/^"/,'').replace(/"$/,'').trim());if(cols[0]&&cols[2]){allProducts.push({name:cols[0],size:cols[1]||'',price:parseFloat(cols[2].replace(/[^0-9.]/g,''))||0,image:cols[3]||'',category:'shoes'})}}}catch(e){console.error(e)}}
for(const p of allProducts){classifyProduct(p)}
populateSizes();
renderProducts()}
function classifyProduct(p){const n=p.name.toLowerCase();const collectables=['tennis','ball','plush','racquet','jumbo'];for(const k of collectables){if(n.includes(k)){p.category='collectables';return}}
const shoes=['dunk','air force','air max','yeezy','jordan','nike','adidas','ugg','tasman','tazz','penny','vapor','foamposite'];for(const k of shoes){if(n.includes(k)){p.category='shoes';return}}
const clothing=['kith wilson','hoodie','jacket','tee','shirt','hat','cap','sweatshirt'];for(const k of clothing){if(n.includes(k)){p.category='clothing';return}}
p.category='collectables'}
function populateSizes(){const sizeSet=new Set();allProducts.forEach(p=>{const sizes=splitSizes(p.size);sizes.forEach(s=>sizeSet.add(s))});const sorted=[...sizeSet].filter(s=>/^[0-9]/.test(s)).sort((a,b)=>parseFloat(a)-parseFloat(b));const sel=document.getElementById('sizeSelect');sorted.forEach(s=>{const opt=document.createElement('option');opt.value=s;opt.textContent=formatSize(s);sel.appendChild(opt)})}
function splitSizes(sizeStr){if(!sizeStr)return[];return sizeStr.split(/[,\/ ;|]+/).map(s=>s.trim()).filter(s=>s&&/^[0-9]/.test(s))}
function formatSize(s){const m=s.match(/^([0-9.]+)([a-z]+)?$/i);if(!m)return s;const num=m[1],suf=(m[2]||'').toUpperCase();if(suf==='W')return`${num} Women's`;if(suf==='M')return`${num} Men's`;if(suf==='C')return`${num} Preschool/Toddler`;if(suf==='Y')return`${num} Grade School`;return num}
function renderProducts(){const cats=['shoes','clothing','collectables'];cats.forEach(cat=>{const filtered=allProducts.filter(p=>p.category===cat&&matchesFilters(p));document.getElementById(`cnt-${cat}`).textContent=filtered.length;const grid=document.getElementById(`grid-${cat}`);grid.innerHTML='';if(filtered.length===0){grid.innerHTML='<div class="no-results">No products found</div>'}else{filtered.forEach(p=>{const card=document.createElement('div');card.className='card';const sizes=splitSizes(p.size);let sizeHTML='';if(sizes.length>1){sizeHTML=`<select class="size-pick" id="sz-${p.name}">${sizes.map(s=>`<option value="${s}">${formatSize(s)}</option>`).join('')}</select>`}else if(sizes.length===1){sizeHTML=`<div class="card-sizes">Size: ${formatSize(sizes[0])}</div>`}
card.innerHTML=`<div class="card-img-wrap"><img src="${p.image}" alt="${p.name}"></div><div class="card-body"><div class="card-name">${p.name}</div><div class="card-price">$${p.price}</div>${sizeHTML}<button class="add-btn" onclick="addToCart('${p.name}',${p.price},'${p.image}')">Add to Cart</button></div>`;grid.appendChild(card)})}})}}
function matchesFilters(p){const search=document.getElementById('searchInput').value.toLowerCase();if(search&&!p.name.toLowerCase().includes(search))return false;const sizeFilt=document.getElementById('sizeSelect').value;if(sizeFilt){const sizes=splitSizes(p.size);if(!sizes.some(s=>s===sizeFilt))return false}
return true}
function applyFilters(){renderProducts()}
function switchTab(cat,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(`sec-${cat}`).classList.add('active');document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function addToCart(name,price,image){const sizeEl=document.getElementById(`sz-${name}`);const size=sizeEl?sizeEl.value:splitSizes(allProducts.find(p=>p.name===name)?.size||'')[0]||'';const existing=cart.find(c=>c.name===name&&c.size===size);if(existing){existing.qty++}else{cart.push({name,price,size,image,qty:1})}
updateCart();const btn=event.target;btn.classList.add('added');btn.textContent='✓ Added';setTimeout(()=>{btn.classList.remove('added');btn.textContent='Add to Cart'},1500)}
function updateCart(){document.getElementById('cartCount').textContent=cart.reduce((s,c)=>s+c.qty,0);const container=document.getElementById('cartItems');if(cart.length===0){container.innerHTML='<div class="cart-empty">Your cart is empty</div>';document.getElementById('cartFooter').style.display='none'}else{container.innerHTML=cart.map((c,i)=>`<div class="cart-item"><img src="${c.image}"><div class="cart-item-info"><div class="cart-item-name">${c.name}</div><div class="cart-item-size">Size: ${formatSize(c.size)}</div><div class="cart-item-price">$${c.price}</div><div class="cart-item-qty"><button class="qty-btn" onclick="changeQty(${i},-1)">-</button><span>${c.qty}</span><button class="qty-btn" onclick="changeQty(${i},1)">+</button></div></div><button class="remove-btn" onclick="removeFromCart(${i})">🗑</button></div>`).join('');const total=cart.reduce((s,c)=>s+(c.price*c.qty),0);document.getElementById('cartTotal').textContent=`$${total.toFixed(2)}`;document.getElementById('cartFooter').style.display='block'}}
function changeQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);updateCart()}
function removeFromCart(i){cart.splice(i,1);updateCart()}
function openCart(){document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartDrawer').classList.add('open')}
function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartDrawer').classList.remove('open')}
async function connectWallet(){if(!window.solana){alert('Please install Phantom wallet');window.open('https://phantom.app');return}
try{const resp=await window.solana.connect();wallet=resp.publicKey;document.getElementById('walletBtn').textContent=`✅ ${wallet.toString().slice(0,4)}...${wallet.toString().slice(-4)}`;document.getElementById('walletBtn').classList.add('wallet-connected')}catch(e){alert('Wallet connection failed')}}
async function openCheckout(){if(!wallet){alert('Connect wallet first');await connectWallet();if(!wallet)return}
closeCart();alert('Checkout flow: Select SOL or USDC to pay')}
</script>
</body>
</html>
